version: '3.8'

services:

  # ── Base de datos PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:15
    container_name: postgres_sandoval
    restart: always
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   
      - ./DB:/docker-entrypoint-initdb.d         
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .                          
    container_name: carrocerias_app
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env                         
    environment:
      DB_HOST: db                     
    volumes:
      - ./uploads:/app/uploads        
    depends_on:
      db:
        condition: service_healthy    

volumes:
  postgres_data: