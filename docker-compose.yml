version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_sandoval
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Ultimatexbox16
      - POSTGRES_DB=carrocerias_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DB:/docker-entrypoint-initdb.d

volumes:
  postgres_data: